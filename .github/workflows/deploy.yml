# 워크플로 이름(GitHub Actions 탭에 표시됨)
name : Spring Boot CI

# 언제 실행할 것인가 (Trigger)
on:
  push:
    branches: ["master"] # master 브랜치에 push 될 때마다 실행ㅇ
  pull_request:
    branches: ["master"] # PR이 들어올 때도 실행

# 할 일 목록 (Jobs)
jobs:
  build:
    # 실행 환경 (리눅스 우분투 최신 버전)
    runs-on: ubuntu-latest
# 워크플로 이름(GitHub Actions 탭에 표시됨)
name : Spring Boot CI

# 언제 실행할 것인가 (Trigger)
on:
  push:
    branches: ["master"] # master 브랜치에 push 될 때마다 실행ㅇ
  pull_request:
    branches: ["master"] # PR이 들어올 때도 실행

# 할 일 목록 (Jobs)
jobs:
  build:
    # 실행 환경 (리눅스 우분투 최신 버전)
    runs-on: ubuntu-latest

    # 실행 단계 (Steps)
    steps:
      # 1. 내 코드 내려받기
      - uses: actions/checkout@v4

      # 2. 자바 설치하기 (JDK 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 권한 부여 (가끔 권한 문제 생길 수 있음)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 빌드 및 테스트 실행 (가장 중요)
      - name: Build with Gradle
        run: ./gradlew clean build
    # 실행 단계 (Steps)
    steps:
      # 1. 내 코드 내려받기
      - uses: actions/checkout@v4

      # 2. 자바 설치하기 (JDK 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 권한 부여 (가끔 권한 문제 생길 수 있음)
      - name: Grant execute permission for gradlew
        run: chmod + x gradlew

      # 4. 빌드 및 테스트 실행 (가장 중요)
      - name: Build with Gradle
        run: ./gradlew clean build
        working-directory: community