# 워크플로 이름(GitHub Actions 탭에 표시됨)
name: Spring Boot CI/CD

# 언제 실행할 것인가 (Trigger)
on:
  push:
    branches: ["master"] # master 브랜치에 push 될 때마다 실행

# 할 일 목록 (Jobs)
jobs:
  build-and-deploy:
    # 실행 환경 (리눅스 우분투 최신 버전)
    runs-on: ubuntu-latest

    # 실행 단계 (Steps)
    steps:
      # 1. 내 코드 내려받기
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Docker Hub 로그인
      - name: Login To Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Docker 이미지 빌드 & Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/community-backend:latest
          build-args: |
            PROFILE=prod

      # 4. AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 5. Backend-A에서 deploy.sh 실행 (블루-그린 배포)
      - name: Deploy to Backend-A
        id: deploy
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.AWS_INSTANCE_ID_A }} \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"export DB_HOST=$DB_HOST && export DB_PORT=$DB_PORT && export DB_NAME=$DB_NAME && export DB_USERNAME=$DB_USERNAME && export DB_PASSWORD=$DB_PASSWORD && /home/ubuntu/app/deploy.sh\"]}" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      # 6. 배포 결과 확인
      - name: Check deployment result
        run: |
          sleep 60s
          aws ssm list-command-invocations \
            --details \
            --instance-id ${{ secrets.AWS_INSTANCE_ID_A }} \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --query "CommandInvocations[].CommandPlugins[].{Status:Status,Output:Output}" \
            --output table