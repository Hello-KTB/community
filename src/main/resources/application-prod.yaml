spring:
  datasource:
    # EC2 내부 MySQL 연결 URL (EC2 로컬에 MySQL 직접 설치했으므로 localhost 사용)
    # 서버 시간대는 UTC로 설정, SSL 암호화 연결 비활성화, RSA 공개키 조회 허용
    url: ${DB_URL}
    # EC2 DB 접속 계정 정보 (로컬 root 계정과 분리해서 관리)
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      # 운영 환경에서는 절대 create 사용 금지 → 기존 데이터 전부 삭제됨
      # none: DDL 아무것도 실행하지 않음, validate: 테이블 구조만 검증
      ddl-auto: none

# EC2 환경 파일 업로드 경로 (EC2 서버 내 실제 존재하는 경로로 지정)
file:
  path: /home/ubuntu/upload